events {}

http {
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=queue_join:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=reservation_write:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=occupancy_ingest:10m rate=10r/m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream user_web_upstream {
    server user-web:5173;
  }

  upstream admin_web_upstream {
    server admin-web:5174;
  }

  upstream api_gateway_upstream {
    server api-gateway:3000;
  }

  server {
    listen 80;
    server_name _;

    location = /api/auth/login {
      limit_req zone=auth_login burst=5 nodelay;
      proxy_pass http://api_gateway_upstream/auth/login;
      include /etc/nginx/proxy_params;
    }

    location ~ ^/api/queues/([^/]+)/(join|leave)$ {
      limit_req zone=queue_join burst=5 nodelay;
      proxy_pass http://api_gateway_upstream/queues/$1/$2;
      include /etc/nginx/proxy_params;
    }

    location = /api/reservations {
      limit_req zone=reservation_write burst=5 nodelay;
      proxy_pass http://api_gateway_upstream/reservations;
      include /etc/nginx/proxy_params;
    }

    location = /api/occupancy-events {
      limit_req zone=occupancy_ingest burst=5 nodelay;
      proxy_pass http://api_gateway_upstream/occupancy-events;
      include /etc/nginx/proxy_params;
    }

    location /api/ {
      limit_req zone=api_general burst=40 nodelay;
      proxy_pass http://api_gateway_upstream/;
      include /etc/nginx/proxy_params;
    }

    location /admin/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://admin_web_upstream/admin/;
      include /etc/nginx/proxy_params;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://user_web_upstream/;
      include /etc/nginx/proxy_params;
    }
  }
}
